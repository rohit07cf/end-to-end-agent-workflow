name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    env:
      MODEL_PROVIDER: mock        # CI runs in mock mode by default
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]' litellm

      - name: Lint
        run: |
          ruff check app evals tests || true   # advisory; doesn't gate

      - name: Unit + integration tests
        run: |
          pytest -q --maxfail=1 --disable-warnings

      - name: Offline evals (regression gates enforced)
        run: |
          python -m evals.run_evals

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            evals/results.json
            evals/report.md
